<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#0a0824"/>
      <stop offset=".52" stop-color="#21155a"/>
      <stop offset="1" stop-color="#091b38"/>
    </linearGradient>
    <radialGradient id="halo">
      <stop stop-color="#46ffe0" stop-opacity=".38"/>
      <stop offset=".52" stop-color="#6755ff" stop-opacity=".16"/>
      <stop offset="1" stop-color="#130d3b" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="body" x1=".2" y1="0" x2=".8" y2="1">
      <stop stop-color="#ffe26a"/>
      <stop offset="1" stop-color="#ffc33b"/>
    </linearGradient>
    <filter id="glow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="11" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="shadow" x="-60%" y="-50%" width="220%" height="230%">
      <feDropShadow dx="0" dy="28" stdDeviation="24" flood-color="#03020f" flood-opacity=".7"/>
    </filter>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <ellipse cx="600" cy="300" rx="460" ry="390" fill="url(#halo)"/>

  <!-- Soft tunnel rings frame the mascot without competing with it. -->
  <g fill="none" stroke="#735cff" opacity=".28">
    <rect x="76" y="45" width="1048" height="540" rx="150" stroke-width="5"/>
    <rect x="147" y="90" width="906" height="450" rx="130" stroke-width="4"/>
    <rect x="220" y="132" width="760" height="366" rx="112" stroke-width="3"/>
  </g>
  <g fill="#53ffe2" filter="url(#glow)">
    <circle cx="232" cy="179" r="7"/>
    <circle cx="969" cy="174" r="5"/>
    <circle cx="984" cy="435" r="8"/>
    <circle cx="187" cy="432" r="4"/>
    <path d="M292 101l6 17 17 6-17 6-6 17-6-17-17-6 17-6Z"/>
    <path d="M899 505l5 14 14 5-14 5-5 14-5-14-14-5 14-5Z"/>
  </g>

  <!-- Close-up of the in-game jelly-bean player. -->
  <g transform="translate(600 323) scale(2.15) translate(-128 -128)" filter="url(#shadow)">
    <path d="M76 135 46 157M181 135l29 18" fill="none" stroke="#ff9d2e" stroke-width="14" stroke-linecap="round"/>
    <path d="M72 145C70 75 92 45 130 45c44 0 60 40 54 106-3 39-25 53-57 53-33 0-54-20-55-59Z" fill="url(#body)" stroke="#fff6b0" stroke-width="8"/>
    <path d="M91 74c18-19 48-23 69-7" fill="none" stroke="#fff8c9" stroke-width="7" stroke-linecap="round" opacity=".7"/>
    <g fill="#21133f">
      <ellipse cx="108" cy="113" rx="12" ry="16"/>
      <ellipse cx="151" cy="113" rx="12" ry="16"/>
    </g>
    <g fill="#fff">
      <circle cx="104" cy="107" r="4"/>
      <circle cx="147" cy="107" r="4"/>
    </g>
    <path d="M113 141a16 16 0 0 0 32 0" fill="none" stroke="#6b2254" stroke-width="6" stroke-linecap="round"/>
    <g fill="#ff6f91">
      <ellipse cx="91" cy="139" rx="10" ry="5"/>
      <ellipse cx="167" cy="139" rx="10" ry="5"/>
    </g>
  </g>
</svg>
